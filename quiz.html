<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Bíblico - VozdefeIA1</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    text-align:center;
    margin:0;
}

header{
    background:#0b6b3a;
    color:white;
    padding:15px;
}

main{
    padding:20px;
}

button{
    padding:10px 20px;
    margin:8px;
    font-size:16px;
    cursor:pointer;
}

#resultado{
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}
</style>

</head>

<body>

<header>
<h1>📖 Quiz Bíblico</h1>
</header>

<main>

<h2>¿Quién construyó el arca?</h2>

<button onclick="respuesta('A')">A) Abraham</button><br>

<button onclick="respuesta('B')">B) Moisés</button><br>

<button onclick="respuesta('C')">C) Noé</button>

<div id="resultado"></div>

</main>

<script>

function respuesta(opcion){

const resultado=document.getElementById("resultado");

if(opcion==="C"){
resultado.innerHTML="✅ ¡Correcto! Noé construyó el arca.";
}else{
resultado.innerHTML="❌ Respuesta incorrecta. Inténtalo otra vez.";
}

}

</script>

</body>
</html>
