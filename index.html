<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>VozdefeIA1</title>
</head>
<body style="font-family: Arial; text-align:center; padding:40px;">

  <h1>🙏 VozdefeIA1</h1>

  <p>Escribe algo y prueba tu aplicación</p>

  <input id="input" placeholder="Escribe aquí..." />
  <button onclick="responder()">Enviar</button>

  <p id="output"></p>

  <script>
    function responder() {
      const texto = document.getElementById("input").value;

      document.getElementById("output").innerText =
        "Respuesta simulada: " + texto;
    }
  </script>

</body>
</html>
