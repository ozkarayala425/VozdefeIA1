<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VozdefeIA1 - Voz de Fe</title>

<style>

body{
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#0b141a,#12355b);
margin:0;
min-height:100vh;
text-align:center;
color:white;
}



header{
background:#12355b;
color:white;
padding:25px;
}

.logo img{
width:120px;
height:120px;
border-radius:50%;
object-fit:contain;
}

h1{
margin:10px;
}

.container{
padding:15px;
}

.card{
background:#202c33;
max-width:500px;
margin:20px auto;
padding:20px;
border-radius:18px;
box-shadow:0 4px 12px rgba(0,0,0,.4);
}

select,input,button{
width:90%;
padding:12px;
margin:8px;
border-radius:10px;
border:none;
font-size:16px;
}

button{
background:#12355b;
color:white;
cursor:pointer;
}

chat-box{
background:#0b141a;
height:450px;
overflow:auto;
padding:12px;
border-radius:15px;
text-align:left;
border:1px solid #2a3942;
}

.bot{
background:#202c33;
color:white;
padding:12px;
border-radius:12px 12px 12px 2px;
margin:8px;
max-width:80%;
display:block;
box-shadow:0 2px 5px rgba(0,0,0,.3)

.user{
background:#005c4b;
color:white;
padding:12px;
border-radius:12px 12px 2px 12px;
margin:8px 8px 8px auto;
max-width:80%;
text-align:right;
box-shadow:0 2px 5px rgba(0,0,0,.3);
}

footer{
padding:20px;
color:#555;
}

</style>

</head>


<body>


<header>

<div class="logo">
<img src="logo.png" alt="VozdefeIA">
</div>

<h1>𓂀 VozdefeIA1</h1>

<p>Una voz de fe para el mundo 🌎</p>

</header>


<div class="container">


<div class="card">

<h2>🙏 Bienvenido</h2>

<p>
Comparte, aprende y fortalece tu fe mediante inteligencia artificial.
</p>


<select>

<option>Español</option>
<option>English</option>
<option>Português</option>

</select>

</div>



<div class="card">

<h2>📖 Versículo del día</h2>

<p>
"Yo soy el camino, y la verdad, y la vida."
<br><br>
Juan 14:6
</p>

</div>

<div class="card">

<h2>💬 Chat Bíblico</h2>

<div id="chat" class="chat-box">

<div class="bot">
🙏 Hola, soy VozdefeIA.
<br>
Puedes preguntarme sobre la Biblia.
</div>


<div class="input-area">

<input id="mensaje" placeholder="Escribe tu pregunta bíblica...">

<button onclick="enviar()">
➤
</button>

</div>


<footer>

𓂀 OSCAR AYALA

</footer>


<script>

function enviar(){

let texto = document.getElementById("mensaje").value.toLowerCase();

if(texto=="") return;

let chat = document.getElementById("chat");

chat.innerHTML += `
<div class="user">
${texto}
</div>
`;

let respuesta = "🙏 Gracias por tu pregunta. Sigue buscando a Dios mediante Su Palabra 📖";


if(texto.includes("jesús") || texto.includes("jesus") || texto.includes("cristo")){

respuesta =
"✝️ Jesús es el Hijo de Dios y nuestro Salvador.\n\n" +
"📖 Juan 14:6 - Yo soy el camino, y la verdad, y la vida.\n\n" +
"✨ Reflexión: Cristo nos muestra el amor y la esperanza de Dios.";

}

else if(texto.includes("pedro")){

respuesta =
"👤 Pedro fue uno de los discípulos más cercanos de Jesús.\n\n" +
"📖 Jesús lo llamó para ser pescador de hombres.\n\n" +
"📜 Versículo base: Mateo 4:19.\n\n" +
"✨ Reflexión: Dios puede transformar una vida dispuesta a seguirle.";

}

else if(texto.includes("dios")){

respuesta =
"🙏 Dios es nuestro Padre celestial y creador de todas las cosas.\n\n" +
"📖 Génesis 1:1.\n\n" +
"✨ Reflexión: Dios nos ama y desea tener una relación con nosotros.";

}

else if(texto.includes("fe")){

respuesta =
"🙏 La fe es confiar en Dios aun cuando no vemos todo claramente.\n\n" +
"📖 Hebreos 11:1.";

}

else if(texto.includes("moisés") || texto.includes("moises")){

respuesta =
"📖 Moisés fue llamado por Dios para liberar al pueblo de Israel de Egipto.\n\n" +
"📜 Éxodo 3.";

}


chat.innerHTML += `
<div class="bot">
${respuesta}
</div>
`;

document.getElementById("mensaje").value = "";

chat.scrollTop = chat.scrollHeight;

}

  

</script>



</body>

</html>
