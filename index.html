<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>VozdefeIA1 Chat</title>

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    #chat {
      width: 100%;
      max-width: 500px;
      height: 400px;
      background: white;
      border-radius: 10px;
      padding: 10px;
      overflow-y: auto;
      margin-bottom: 10px;
    }

    .msg {
      padding: 8px;
      margin: 5px 0;
      border-radius: 8px;
    }

    .user {
      background: #d1e7ff;
      text-align: right;
    }

    .bot {
      background: #e6ffe6;
      text-align: left;
    }

    input {
      width: 70%;
      padding: 10px;
    }

    button {
      padding: 10px;
    }
  </style>

</head>
<body>

  <h2>🙏 VozdefeIA1 Chat</h2>

  <div id="chat"></div>

  <div>
    <input id="input" placeholder="Escribe tu mensaje..." />
    <button onclick="send()">Enviar</button>
  </div>

  <script>
    function addMessage(text, type) {
      const div = document.createElement("div");
      div.className = "msg " + type;
      div.innerText = text;

      document.getElementById("chat").appendChild(div);
      document.getElementById("chat").scrollTop =
        document.getElementById("chat").scrollHeight;
    }

    function send() {
      const input = document.getElementById("input");
      const text = input.value;

      if (!text) return;

      addMessage(text, "user");

      // respuesta simulada
      setTimeout(() => {
        addMessage("Dios te responde: " + text, "bot");
      }, 500);

      input.value = "";
    }
  </script>

</body>
</html>
