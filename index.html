<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VozdefeIA1 - Voz de Fe</title>

<style>

body{
font-family:Arial,sans-serif;
background:#eaf7f7;
margin:0;
text-align:center;
}

header{
background:#12355b;
color:white;
padding:25px;
}

.logo img{
width:120px;
height:120px;
border-radius:50%;
object-fit:contain;
}

h1{
margin:10px;
}

.container{
padding:15px;
}

.card{
background:white;
max-width:500px;
margin:20px auto;
padding:20px;
border-radius:18px;
box-shadow:0 4px 12px rgba(0,0,0,.15);
}

select,input,button{
width:90%;
padding:12px;
margin:8px;
border-radius:10px;
border:none;
font-size:16px;
}

button{
background:#12355b;
color:white;
cursor:pointer;
}

.chat-box{
background:#e5ddd5;
height:300px;
overflow:auto;
padding:10px;
border-radius:15px;
text-align:left;
}

.bot{
background:white;
padding:10px;
border-radius:10px;
margin:8px;
}

.user{
background:#dcf8c6;
padding:10px;
border-radius:10px;
margin:8px;
text-align:right;
}

footer{
padding:20px;
color:#555;
}

</style>

</head>


<body>


<header>

<div class="logo">
<img src="logo.png" alt="VozdefeIA">
</div>

<h1>𓂀 VozdefeIA1</h1>

<p>Una voz de fe para el mundo 🌎</p>

</header>


<div class="container">


<div class="card">

<h2>🙏 Bienvenido</h2>

<p>
Comparte, aprende y fortalece tu fe mediante inteligencia artificial.
</p>


<select>

<option>Español</option>
<option>English</option>
<option>Português</option>

</select>

</div>



<div class="card">

<h2>📖 Versículo del día</h2>

<p>
"Yo soy el camino, y la verdad, y la vida."
<br><br>
Juan 14:6
</p>

</div>



<div class="card">

<h2>💬 Chat Bíblico</h2>


<div id="chat" class="chat-box">

<div class="bot">
🙏 Hola, soy VozdefeIA.
<br>
Puedes preguntarme sobre la Biblia.
</div>

</div>


<input id="mensaje" placeholder="Escribe tu pregunta bíblica...">

<button onclick="enviar()">
Enviar ➤
</button>


</div>


</div>


<footer>

𓂀 OSCAR AYALA

</footer>

<script>

function enviar(){

let texto = document.getElementById("mensaje").value.toLowerCase();

if(texto=="") return;

let chat = document.getElementById("chat");

chat.innerHTML += `
<div class="user">
${texto}
</div>
`;



// Respuestas bíblicas

if(texto.includes("jesús") || texto.includes("jesus") || texto.includes("cristo")){

respuesta = "✝️ Jesús es el Hijo de Dios y nuestro Salvador.\n\n📖 Juan 14:6: Yo soy el camino, y la verdad, y la vida.\n\n✨ Jesús nos enseña el amor, el perdón y la esperanza.";

}

else if(texto.includes("dios") || texto.includes("padre")){

respuesta = "🙏 Dios es nuestro Padre celestial, creador de todas las cosas.\n\n📖 Génesis 1:1: En el principio creó Dios los cielos y la tierra.\n\n✨ Dios nos ama y desea una relación con nosotros.";

}

else if(texto.includes("creación") || texto.includes("creacion") || texto.includes("mundo")){

respuesta = "🌎 La Biblia enseña que Dios creó los cielos, la tierra y todo lo que existe.\n\n📖 Génesis 1:1.";

}

else if(texto.includes("moisés") || texto.includes("moises")){

respuesta = "📖 Moisés fue llamado por Dios para liberar al pueblo de Israel de Egipto.\n\n✨ Dios mostró su poder y guió a Moisés durante su misión.";

}

else if(texto.includes("noé") || texto.includes("noe") || texto.includes("arca")){

respuesta = "🌈 Noé obedeció a Dios y construyó el arca por fe.\n\n📖 Génesis 6:22.";

}

else if(texto.includes("fe")){

respuesta = "🙏 La fe es confiar en Dios aun cuando no vemos todo claramente.\n\n📖 Hebreos 11:1.";

}

else if(texto.includes("oración") || texto.includes("oracion") || texto.includes("orar")){

respuesta = "🙏 La oración es hablar con Dios con humildad y confianza.\n\n📖 Filipenses 4:6.";

}

else if(texto.includes("perdón") || texto.includes("perdon")){

respuesta = "❤️ Jesús enseñó la importancia de perdonar.\n\n📖 Efesios 4:32.";

}

else if(texto.includes("bautismo")){

respuesta = "💧 El bautismo representa una nueva vida en Cristo.\n\n📖 Romanos 6:4.";

}

else if(texto.includes("juan 3:16")){

respuesta = "✨ Juan 3:16 muestra el gran amor de Dios al enviar a Jesucristo para darnos vida eterna.";

}

chat.innerHTML += `
<div class="bot">
${respuesta}
</div>
`;


document.getElementById("mensaje").value = "";

chat.scrollTop = chat.scrollHeight;

}

</script>



</body>

</html>
